<div class="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
  <button
    onclick="navigateTo('home')"
    class="flex items-center gap-3.5 text-left focus:outline-none group"
  >
    <div
      class="relative bg-gradient-to-br from-slate-950 via-slate-900 to-amber-700 w-14 h-14 rounded-2xl shadow-xl flex items-center justify-center group-hover:rotate-1 transition-transform overflow-hidden"
    >
      <img
        src="FINAL%20LOGO%20BLUE%20.png"
        alt="Vatan Care Logo"
        class="w-full h-full object-cover"
      />
      <div
        class="absolute -bottom-1 -right-1 bg-amber-500 text-slate-950 text-[10px] w-5 h-5 rounded-md flex items-center justify-center border-2 border-white shadow-sm z-10"
      >
        <i class="fa-solid fa-shield"></i>
      </div>
    </div>
    <div>
      <span
        class="text-2xl font-black tracking-tight text-slate-950 block leading-none"
        >VATAN CARE</span
      >
      <span
        class="text-[10px] tracking-widest text-amber-600 font-extrabold uppercase block mt-2"
      >
        <span class="text-en">Frame The Dream</span>
        <span class="text-gu">ચિંતા છોડો, અમે છીએ સેવામાં</span>
      </span>
    </div>
  </button>

  <div class="flex items-center gap-6">
    <nav
      class="hidden lg:flex items-center gap-8 font-bold text-slate-600 text-xs uppercase tracking-widest"
    >
      <button
        id="nav-home"
        onclick="navigateTo('home')"
        class="text-amber-600 transition-colors font-extrabold"
      >
        <span class="text-en">Home</span><span class="text-gu">હોમ પેજ</span>
      </button>
      <button
        id="nav-services"
        onclick="navigateTo('services')"
        class="hover:text-amber-600 transition-colors"
      >
        <span class="text-en">All 9 Services</span
        ><span class="text-gu">તમામ ૯ સેવાઓ</span>
      </button>
      <button
        id="nav-pricing"
        onclick="navigateTo('pricing')"
        class="hover:text-amber-600 transition-colors"
      >
        <span class="text-en">Retainer Pricing</span
        ><span class="text-gu">પ્લાન કિંમત</span>
      </button>
    </nav>

    <div
      class="bg-slate-100 p-1 rounded-xl border border-gray-200/60 flex items-center font-black text-xs shadow-inner"
    >
      <button
        id="btn-lang-en"
        onclick="setLanguage('en')"
        class="px-4 py-2 rounded-lg transition-all bg-slate-900 text-white shadow-sm"
      >
        EN
      </button>
      <button
        id="btn-lang-gu"
        onclick="setLanguage('gu')"
        class="px-4 py-2 rounded-lg transition-all text-slate-600"
      >
        ગુજરાતી
      </button>
    </div>

    <button
      onclick="navigateTo('pricing')"
      class="bg-amber-500 hover:bg-amber-600 text-slate-950 px-6 py-3.5 rounded-xl font-black text-xs uppercase tracking-wider shadow-md transition-all hidden sm:block premium-btn"
    >
      <span class="text-en">View Retainers</span
      ><span class="text-gu">પ્લાનની વિગત</span>
    </button>

    <!-- Mobile Menu Toggle Button (Visible only on mobile/tablet) -->
    <button
      id="btn-mobile-menu-toggle"
      onclick="toggleMobileMenu(true)"
      class="lg:hidden text-slate-800 hover:text-amber-600 focus:outline-none p-2.5 rounded-xl border border-gray-200 hover:bg-slate-50 transition-all text-base flex items-center justify-center shrink-0"
      aria-label="Open Menu"
    >
      <i class="fa-solid fa-bars text-lg"></i>
    </button>
  </div>
</div>

<!-- Mobile Drawer Backdrop Overlay -->
<div
  id="mobile-drawer-backdrop"
  onclick="toggleMobileMenu(false)"
  class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[90] hidden opacity-0 transition-opacity duration-300"
></div>

<!-- Mobile Navigation Drawer -->
<div
  id="mobile-drawer"
  class="fixed top-0 right-0 bottom-0 w-80 max-w-[85vw] bg-white z-[100] shadow-2xl border-l border-gray-100 flex flex-col justify-between p-6 transform translate-x-full transition-transform duration-300 ease-in-out"
>
  <div class="space-y-8">
    <!-- Drawer Header -->
    <div
      class="flex justify-between items-center pb-4 border-b border-gray-100"
    >
      <div class="flex items-center gap-2">
        <div
          class="bg-gradient-to-br from-slate-950 via-slate-900 to-amber-700 w-8 h-8 rounded-lg flex items-center justify-center overflow-hidden"
        >
          <img
            src="FINAL LOGO BLUE .png"
            alt="Logo"
            class="w-full h-full object-cover"
          />
        </div>
        <span class="text-sm font-black tracking-tight text-slate-950"
          >VATAN CARE</span
        >
      </div>
      <button
        onclick="toggleMobileMenu(false)"
        class="w-9 h-9 flex items-center justify-center text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-xl transition-colors"
        aria-label="Close Menu"
      >
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <!-- Drawer Navigation Links -->
    <nav
      class="flex flex-col gap-4 font-bold text-xs uppercase tracking-widest text-slate-600"
    >
      <button
        id="drawer-nav-home"
        onclick="navigateFromMobile('home')"
        class="text-left py-3 px-4 rounded-xl hover:bg-slate-50 hover:text-amber-600 transition-all flex items-center gap-3"
      >
        <i class="fa-solid fa-house text-slate-400 text-sm w-5 text-center"></i>
        <span
          ><span class="text-en">Home</span
          ><span class="text-gu">હોમ પેજ</span></span
        >
      </button>
      <button
        id="drawer-nav-services"
        onclick="navigateFromMobile('services')"
        class="text-left py-3 px-4 rounded-xl hover:bg-slate-50 hover:text-amber-600 transition-all flex items-center gap-3"
      >
        <i
          class="fa-solid fa-hand-holding-heart text-slate-400 text-sm w-5 text-center"
        ></i>
        <span
          ><span class="text-en">All 9 Services</span
          ><span class="text-gu">તમામ ૯ સેવાઓ</span></span
        >
      </button>
      <button
        id="drawer-nav-pricing"
        onclick="navigateFromMobile('pricing')"
        class="text-left py-3 px-4 rounded-xl hover:bg-slate-50 hover:text-amber-600 transition-all flex items-center gap-3"
      >
        <i
          class="fa-solid fa-box-open text-slate-400 text-sm w-5 text-center"
        ></i>
        <span
          ><span class="text-en">Retainer Pricing</span
          ><span class="text-gu">પ્લાન કિંમત</span></span
        >
      </button>
    </nav>
  </div>

  <!-- Drawer Footer Info -->
  <div class="space-y-6 pt-6 border-t border-gray-100">
    <!-- Mobile-only View Retainers CTA -->
    <button
      onclick="navigateFromMobile('pricing')"
      class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-md transition-colors flex items-center justify-center gap-2 premium-btn animate-btn"
    >
      <i class="fa-solid fa-star"></i>
      <span class="text-en">View Retainers</span>
      <span class="text-gu">પ્લાનની વિગત</span>
    </button>

    <div class="text-slate-400 text-[10px] text-center space-y-1 font-bold">
      <p>VATAN CARE HELP DESK</p>
      <a
        href="mailto:vatancare01@gmail.com"
        class="text-amber-600 block hover:underline"
        >vatancare01@gmail.com</a
      >
    </div>
  </div>
</div>
